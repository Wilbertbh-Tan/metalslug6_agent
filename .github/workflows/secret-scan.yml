name: Secret Detection

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  detect-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install detect-secrets
        run: pip install "detect-secrets[gibbs]==1.4.0"

      - name: Scan for secrets
        run: |
          detect-secrets scan > /tmp/new_baseline.json
          detect-secrets audit --report /tmp/new_baseline.json
