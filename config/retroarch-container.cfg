# RetroArch config optimised for headless container training (Xvfb, no GPU).

# --- Video ---
video_driver = "gl"
video_threaded = "false"
video_fullscreen = "false"
video_windowed_fullscreen = "false"

# --- Input ---
input_driver = "x"

# --- Network commands (needed for RAM reads on port 55355) ---
network_cmd_enable = "true"
network_cmd_port = "55355"

# --- Performance: run emulator uncapped (no frame limiting) ---
fastforward_ratio = "-1.0"
audio_sync = "false"
audio_enable = "false"
video_vsync = "false"
video_swap_interval = "0"
menu_throttle_framerate = "false"
video_frame_delay = "0"

# --- Paths ---
system_directory = "/games"
savefile_directory = "/games"
savestate_directory = "/games"

# --- UI ---
rgui_show_start_screen = "false"
